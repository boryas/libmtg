<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>pilegen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; padding: 0.75rem 1.5rem; }
    h1 { font-size: 1rem; color: #c0c0d0; }
    button, select { background: #16213e; color: #e0e0e0; border: 1px solid #0f3460; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.8rem; border-radius: 4px; }
    button:hover, select:hover { background: #0f3460; }
    select { appearance: auto; }
    .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .sigil { font-size: 0.7rem; padding: 2px 6px; border-radius: 3px; display: inline-block; vertical-align: middle; background: #1a1a3e; color: #5dade2; border: 1px solid #2a2a5a; }
    .boards { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(7, auto); column-gap: 1.5rem; margin-bottom: 1.5rem; }
    .board { background: #16213e; border-radius: 8px; padding: 1rem; border: 1px solid #0f3460;
      display: grid; grid-row: 1 / span 7; grid-template-rows: subgrid; row-gap: 0.4rem; }
    .zone-row { display: flex; gap: 0.4rem; }
    .zone-row > .zone { flex: 1; min-width: 0; }
    .zone-row > .zone.stack-zone { flex: 0 0 auto; }
    .board h2 { font-size: 1rem; border-bottom: 1px solid #0f3460; padding-bottom: 0.5rem; display: flex; align-items: baseline; gap: 0.5rem; flex-wrap: wrap; }
    .board h2 .life-inline { font-size: 0.85rem; color: #aaa; font-weight: normal; }
    .board h2 .life-inline .life-transition { color: #666; font-size: 0.8rem; }
    .board h2.us { color: #5dade2; }
    .board h2.opp { color: #e74c3c; }
    .zone { background: #111a2e; border: 1px solid #0f3460; border-radius: 5px; padding: 0.4rem 0.5rem; }
    .zone:empty, .zone.zone-empty { background: none; border: none; padding: 0; }
    .zone-label { font-size: 0.65rem; text-transform: uppercase; color: #555; letter-spacing: 0.05em; margin-bottom: 0.2rem; }

    /* Normal card layout. Hover zoom is applied to the <img> (not the card),
       so the card's hit-region stays at the original size — that means moving
       the cursor to an adjacent card works immediately instead of staying
       trapped under the enlarged one. pointer-events: none on the scaled img
       also lets clicks pass through the overflowing area to whatever's below. */
    .cards { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: flex-start; }
    .card { position: relative; width: 100px; border-radius: 6px; overflow: hidden; border: 1px solid #333; flex-shrink: 0; }
    .card img { width: 100%; display: block; transition: transform 0.12s; }
    .card:hover { z-index: 10; overflow: visible; }
    .card:hover img { transform: scale(1.8); pointer-events: none; }
    .card.tapped { transform: rotate(90deg); margin: 1rem 0.5rem; }
    .card-badge { position: absolute; bottom: 2px; right: 2px; background: rgba(0,0,0,0.8); color: #fff; font-size: 0.65rem; padding: 1px 4px; border-radius: 3px; }

    /* Grid layout for pool zones (graveyard, exile) */
    .cards-grid { display: grid; grid-template-columns: repeat(8, 80px); gap: 4px; }
    .cards-grid .card { width: 80px; }
    .cards-grid .card:hover img { transform: scale(2); }

    /* Compact column layout — cards overlap vertically within columns */
    .cards-columns { display: flex; gap: 2px; flex-wrap: wrap; }
    .cards-col { display: flex; flex-direction: column; width: 68px; }
    .cards-col .card { width: 68px; margin-top: -65px; position: relative; }
    .cards-col .card:first-child { margin-top: 0; }
    .cards-col .card:hover img { transform: scale(2.2); }

    .land-drop { font-size: 0.7rem; padding: 2px 6px; border-radius: 3px; display: inline-block; vertical-align: middle; }
    .land-drop.available { background: #1a3a1a; color: #6fcf6f; border: 1px solid #2a5a2a; }
    .land-drop.used { background: #3a1a1a; color: #cf6f6f; border: 1px solid #5a2a2a; }
    .log { background: #16213e; border-radius: 8px; padding: 1rem; border: 1px solid #0f3460; }
    .log summary { cursor: pointer; font-size: 0.9rem; color: #888; }
    .log pre { font-family: monospace; font-size: 0.75rem; margin-top: 0.5rem; white-space: pre-wrap; color: #aaa; }
    .hidden-cards { color: #666; font-style: italic; font-size: 0.8rem; padding: 0.25rem 0; }
    #loading { color: #666; }

    .zone.stack-zone { background: #1a1230; border-color: #5b2c8e; }
    .zone.stack-zone .zone-label { color: #9b59b6; }

    .zone.pile-zone { background: #2a2410; border-color: #a8831a; margin-bottom: 0.4rem; }
    .zone.pile-zone .zone-label { color: #f1c40f; }
    .zone.pile-zone.unordered-tray { background: #1e1a10; border-color: #554012; margin-bottom: 0.8rem; }
    .zone.pile-zone.unordered-tray .zone-label { color: #a08a3a; }
    #pile-display { min-height: 0; }

    /* Pile selection */
    .card.pile-selected { border: 2px solid #2ecc71; box-shadow: 0 0 8px rgba(46, 204, 113, 0.4); }
    .card.pile-candidate { cursor: pointer; }
    .card.pile-candidate:not(.pile-selected) { border: 2px solid transparent; }
    .card.order-locked { cursor: default; opacity: 0.55; }
    .pile-count { font-size: 0.7rem; color: #2ecc71; margin-left: 0.5rem; }
    .pile-count.complete { color: #f1c40f; }
    .order-slot { position: absolute; top: 3px; left: 3px; background: #f1c40f; color: #000;
      font-weight: 700; font-size: 0.85rem; min-width: 20px; height: 20px; line-height: 20px;
      text-align: center; border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.6); z-index: 2; }

    /* Share feedback */
    .share-status { font-size: 0.75rem; color: #2ecc71; transition: opacity 0.5s; margin-left: 0.25rem; }
    .shared-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 3px; background: #1a3a1a; color: #2ecc71; border: 1px solid #2a5a2a; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Doomsday Pile Scenario</h1>
    <label style="color:#888;font-size:0.85rem">vs</label>
    <select id="matchup"></select>
    <button id="run">Generate</button>
    <button id="confirm-pile" style="display:none"></button>
    <button id="edit-picks" style="display:none">← Edit picks</button>
    <button id="share" style="display:none">Share</button>
    <button id="reveal" style="display:none">Reveal pile</button>
    <input id="token-input" type="text" placeholder="Paste snapshot token…" style="background:#16213e;color:#e0e0e0;border:1px solid #0f3460;padding:0.3rem 0.5rem;font-size:0.75rem;border-radius:4px;width:18ch;font-family:monospace;">
    <button id="load-token">Load</button>
    <span id="share-status" class="share-status" style="opacity:0"></span>
  </div>
  <div id="loading">Loading WASM…</div>
  <div id="content" style="display:none">
    <div id="pile-display"></div>
    <div class="boards">
      <div class="board" id="us-board"></div>
      <div class="board" id="opp-board"></div>
    </div>
    <details class="log" open>
      <summary>Strategy Decisions</summary>
      <pre id="decision-log"></pre>
    </details>
    <details class="log">
      <summary>Turn Log</summary>
      <pre id="log"></pre>
    </details>
  </div>

  <script type="module">
    import init, { run_scenario, list_matchups, encode_snapshot, decode_snapshot } from '../pkg/libmtg_doomsday.js';
    await init();

    // ── State ──────────────────────────────────────────────────────────────────
    let currentData = null;             // ScenarioResult object
    let pileSelected = new Set();       // user's picks: "lib:i" or "gy:i" strings
    let pendingPile  = new Map();       // loaded-but-hidden pile (puzzle mode) key→slot
    let pilePhase    = 'select';        // 'select' → picking 5, 'order' → assigning slots
    let pileSlots    = new Map();       // key → slot (1 = top of pile, PILE_MAX = bottom)
    const PILE_MAX = 5;

    // ── Setup ──────────────────────────────────────────────────────────────────
    const sel = document.getElementById('matchup');
    for (const m of JSON.parse(list_matchups())) {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      sel.appendChild(opt);
    }

    // ── Card rendering ─────────────────────────────────────────────────────────
    const scryfallImg = (name) => {
      const n = name.replace(/ Token$/, '');
      return `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(n)}&format=image&version=small`;
    };

    function renderCard(name, opts = {}) {
      const div = document.createElement('div');
      let cls = 'card';
      if (opts.tapped) cls += ' tapped';
      if (opts.pileSelected) cls += ' pile-selected';
      if (opts.pileCandidate) cls += ' pile-candidate';
      if (opts.orderLocked) cls += ' order-locked';
      div.className = cls;
      const img = document.createElement('img');
      img.src = opts.flipped ? scryfallImg(name) + '&face=back' : scryfallImg(name);
      img.alt = name;
      img.title = name + (opts.flipped ? ' (transformed)' : '');
      img.loading = 'lazy';
      div.appendChild(img);
      if (opts.badge) {
        const badge = document.createElement('span');
        badge.className = 'card-badge';
        badge.textContent = opts.badge;
        div.appendChild(badge);
      }
      if (opts.orderSlot) {
        const slot = document.createElement('span');
        slot.className = 'order-slot';
        slot.textContent = opts.orderSlot;
        div.appendChild(slot);
      }
      return div;
    }

    function renderZone(container, label, items, opts = {}) {
      const zone = document.createElement('div');
      zone.className = 'zone' + (opts.extraClass ? ' ' + opts.extraClass : '');
      const lbl = document.createElement('div');
      lbl.className = 'zone-label';
      let labelText = label + (opts.count != null ? ` (${opts.count})` : '');
      lbl.innerHTML = labelText + (opts.labelSuffix || '');
      zone.appendChild(lbl);
      if (!items.length) {
        container.appendChild(zone);
        return;
      }

      if (opts.columns) {
        const ncols = 8;
        const cols = Array.from({ length: ncols }, () => []);
        items.forEach((item, i) => cols[i % ncols].push(item));
        const wrap = document.createElement('div');
        wrap.className = 'cards-columns';
        for (const col of cols) {
          if (!col.length) continue;
          const colDiv = document.createElement('div');
          colDiv.className = 'cards-col';
          for (const item of col) colDiv.appendChild(item);
          wrap.appendChild(colDiv);
        }
        zone.appendChild(wrap);
      } else {
        const cards = document.createElement('div');
        cards.className = opts.grid ? 'cards-grid' : 'cards';
        for (const item of items) cards.appendChild(item);
        zone.appendChild(cards);
      }

      container.appendChild(zone);
    }

    // ── Board rendering ────────────────────────────────────────────────────────
    function renderBoard(el, player, isUs, data) {
      el.innerHTML = '';

      // Row 1: deck name + life inline
      const h2 = document.createElement('h2');
      h2.className = isUs ? 'us' : 'opp';
      h2.textContent = player.deck_name;
      const lifeSpan = document.createElement('span');
      lifeSpan.className = 'life-inline';
      if (isUs && data.life_before_dd != null) {
        lifeSpan.innerHTML = `&#9829; ${data.life_before_dd} <span class="life-transition">&rarr; ${player.life}</span>`;
      } else {
        lifeSpan.textContent = `\u2665 ${player.life}`;
      }
      h2.appendChild(lifeSpan);
      if (isUs) {
        const ld = document.createElement('span');
        ld.className = 'land-drop ' + (player.land_drop_available ? 'available' : 'used');
        ld.textContent = player.land_drop_available ? 'Land drop \u2713' : 'Land drop \u2717';
        h2.appendChild(ld);
        const turn = document.createElement('span');
        turn.className = 'sigil';
        turn.textContent = `T${data.turn}`;
        h2.appendChild(turn);
        const pd = document.createElement('span');
        pd.className = 'sigil';
        pd.textContent = data.on_play ? 'Play' : 'Draw';
        h2.appendChild(pd);
      }
      el.appendChild(h2);

      // Row 2: permanents + stack side by side
      const permCards = player.permanents.map(p => {
        let badge = [];
        if (p.counters) badge.push(`${p.counters > 0 ? '+' : ''}${p.counters}`);
        if (p.loyalty) badge.push(`Loy:${p.loyalty}`);
        return renderCard(p.name, { tapped: p.tapped, flipped: p.flipped, badge: badge.join(' ') || undefined });
      });
      const stackItems = (isUs ? (data.stack || []) : []);
      if (stackItems.length) {
        const row = document.createElement('div');
        row.className = 'zone-row';
        renderZone(row, 'Permanents', permCards);
        renderZone(row, 'Stack', stackItems.map(name => renderCard(name)), { extraClass: 'stack-zone' });
        el.appendChild(row);
      } else {
        renderZone(el, 'Permanents', permCards);
      }

      // Row 3: lands
      const landCards = player.lands.map(p => {
        let badge = [];
        if (p.counters) badge.push(`${p.counters > 0 ? '+' : ''}${p.counters}`);
        return renderCard(p.name, { tapped: p.tapped, flipped: p.flipped, badge: badge.join(' ') || undefined });
      });
      renderZone(el, 'Lands', landCards);

      // Row 4: hand
      const handCards = player.hand.map(c => renderCard(c.name));
      for (let i = 0; i < player.hand_hidden; i++) {
        const div = document.createElement('div');
        div.className = 'card card-back';
        const img = document.createElement('img');
        img.src = 'https://gamepedia.cursecdn.com/mtgsalvation_gamepedia/f/f8/Magic_card_back.jpg';
        img.alt = 'Hidden card';
        img.title = 'Hidden card';
        div.appendChild(img);
        handCards.push(div);
      }
      renderZone(el, 'Hand', handCards, { extraClass: 'hand-zone' });

      // Row 5: library (pile candidates for us)
      const libCards = player.library.map((name, i) => {
        const key = `lib:${i}`;
        const card = renderCard(name, pileCardOpts(isUs, key));
        if (isUs) {
          card.addEventListener('click', (e) => {
            e.stopPropagation();
            handlePileClick(key);
          });
        }
        return card;
      });
      const pileCount = pileSelected.size;
      const hiddenNote = pendingPile.size > 0 ? ' · hidden pile loaded' : '';
      const pileSuffix = isUs
        ? `<span class="pile-count${pileCount === PILE_MAX ? ' complete' : ''}">${pileCount}/${PILE_MAX} pile${hiddenNote}</span>`
        : '';
      renderZone(el, 'Library', libCards, {
        columns: true,
        count: player.library.length || undefined,
        labelSuffix: pileSuffix,
      });

      // Row 6: graveyard (pile candidates for us)
      const gyCards = player.graveyard.map((name, i) => {
        const key = `gy:${i}`;
        const card = renderCard(name, pileCardOpts(isUs, key));
        if (isUs) {
          card.addEventListener('click', (e) => {
            e.stopPropagation();
            handlePileClick(key);
          });
        }
        return card;
      });
      renderZone(el, 'Graveyard', gyCards, { grid: true, count: player.graveyard.length });

      // Row 7: exile
      const exCards = player.exile.map(name => renderCard(name));
      renderZone(el, 'Exile', exCards, { grid: true, count: player.exile.length });
    }

    // ── Pile selection ─────────────────────────────────────────────────────────
    function pileCardOpts(isUs, key) {
      if (!isUs) return {};
      const selected = pileSelected.has(key);
      return {
        pileSelected: selected,
        pileCandidate: true,
        orderSlot: pilePhase === 'order' ? pileSlots.get(key) : undefined,
        orderLocked: pilePhase === 'order' && !selected,
      };
    }

    function handlePileClick(key) {
      if (pilePhase === 'select') {
        togglePileSelect(key);
      } else {
        togglePileSlot(key);
      }
    }

    function togglePileSelect(key) {
      if (pileSelected.has(key)) {
        pileSelected.delete(key);
      } else if (pileSelected.size >= PILE_MAX) {
        showStatus(`Pile full (${PILE_MAX}/${PILE_MAX})`);
        return;
      } else {
        pileSelected.add(key);
      }
      renderAll();
    }

    // In order phase: click one of the 5 picks. First click takes slot PILE_MAX
    // (bottom of pile); next click takes the next-largest empty slot, etc.
    // Clicking an already-ordered card frees its slot without touching others.
    function togglePileSlot(key) {
      if (!pileSelected.has(key)) return;
      if (pileSlots.has(key)) {
        pileSlots.delete(key);
      } else {
        const used = new Set(pileSlots.values());
        for (let slot = PILE_MAX; slot >= 1; slot--) {
          if (!used.has(slot)) { pileSlots.set(key, slot); break; }
        }
      }
      renderAll();
    }

    function enterOrderPhase() {
      if (pileSelected.size !== PILE_MAX) return;
      pilePhase = 'order';
      pileSlots = new Map();
      renderAll();
    }

    function backToSelect() {
      pilePhase = 'select';
      pileSlots = new Map();
      renderAll();
    }

    function confirmPile() {
      if (pileSlots.size !== PILE_MAX) return;
      showStatus('Pile confirmed');
    }

    function updatePileButtons() {
      const confirm = document.getElementById('confirm-pile');
      const back    = document.getElementById('edit-picks');
      if (pilePhase === 'order') {
        confirm.style.display = '';
        confirm.textContent = 'Confirm pile';
        confirm.disabled = pileSlots.size !== PILE_MAX;
        back.style.display = '';
      } else {
        back.style.display = 'none';
        if (pileSelected.size === PILE_MAX) {
          confirm.style.display = '';
          confirm.textContent = 'Confirm pile cards';
          confirm.disabled = false;
        } else {
          confirm.style.display = 'none';
        }
      }
    }

    // Deterministic fallback slot ordering when the user hasn't ordered picks:
    // library indices ascending, then graveyard indices ascending.
    function keyOrder(a, b) {
      const [za, ia] = a.split(':'); const [zb, ib] = b.split(':');
      if (za !== zb) return za === 'lib' ? -1 : 1;
      return parseInt(ia, 10) - parseInt(ib, 10);
    }

    // Build {library:[[idx,slot]], graveyard:[[idx,slot]]} for the wire format.
    // If `slots` has all PILE_MAX entries, use its slot values; otherwise assign
    // slots 1..N deterministically so the wire always carries an order.
    function pileToWire(keys, slots) {
      const keyList = [...keys];
      const ordered = slots.size === PILE_MAX;
      if (ordered) {
        keyList.sort((a, b) => slots.get(a) - slots.get(b));
      } else {
        keyList.sort(keyOrder);
      }
      const out = { library: [], graveyard: [] };
      keyList.forEach((key, i) => {
        const [zone, idxStr] = key.split(':');
        const idx = parseInt(idxStr, 10);
        const slot = ordered ? slots.get(key) : (i + 1);
        const arr = zone === 'lib' ? out.library : out.graveyard;
        arr.push([idx, slot]);
      });
      return out;
    }

    function wireToPile(pile) {
      const map = new Map();
      for (const [i, slot] of pile.library || [])   map.set(`lib:${i}`, slot);
      for (const [i, slot] of pile.graveyard || []) map.set(`gy:${i}`, slot);
      return map;
    }

    // ── Rendering ──────────────────────────────────────────────────────────────
    function renderPileDisplay() {
      const el = document.getElementById('pile-display');
      el.innerHTML = '';
      if (!currentData || pilePhase !== 'order' || pileSelected.size === 0) return;

      const cardFor = (key) => {
        const [zone, idxStr] = key.split(':');
        const idx = parseInt(idxStr, 10);
        const name = zone === 'lib'
          ? currentData.us.library[idx]
          : currentData.us.graveyard[idx];
        const card = renderCard(name, { orderSlot: pileSlots.get(key), pileCandidate: true });
        card.addEventListener('click', (e) => {
          e.stopPropagation();
          handlePileClick(key);
        });
        return card;
      };

      const ordered   = [...pileSelected].filter(k => pileSlots.has(k))
                        .sort((a, b) => pileSlots.get(a) - pileSlots.get(b));
      const unordered = [...pileSelected].filter(k => !pileSlots.has(k))
                        .sort(keyOrder);

      renderZone(el, 'Pile (top → bottom)',   ordered.map(cardFor),   { extraClass: 'pile-zone' });
      renderZone(el, 'Picks (click to order)', unordered.map(cardFor), { extraClass: 'pile-zone unordered-tray' });
    }

    function renderAll() {
      if (!currentData) return;
      renderPileDisplay();
      renderBoard(document.getElementById('us-board'), currentData.us, true, currentData);
      renderBoard(document.getElementById('opp-board'), currentData.opp, false, currentData);
      document.getElementById('decision-log').textContent = (currentData.decision_log || []).join('\n');
      document.getElementById('log').textContent = (currentData.log || []).join('\n')
        + '\n\n' + (currentData.text_summary || '');
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = '';
      document.getElementById('share').style.display = '';
      document.getElementById('reveal').style.display = pendingPile.size > 0 ? '' : 'none';
      updatePileButtons();
    }

    // ── Generate scenario ──────────────────────────────────────────────────────
    function generate() {
      currentData = JSON.parse(run_scenario(sel.value));
      pileSelected = new Set();
      pendingPile  = new Map();
      pileSlots    = new Map();
      pilePhase    = 'select';
      // Clear any shared URL state.
      if (window.location.hash.startsWith('#s=')) {
        window.history.replaceState(null, '', window.location.pathname);
      }
      renderAll();
    }

    // ── Share ──────────────────────────────────────────────────────────────────
    // Shares whatever the user currently has highlighted. If a hidden pile is
    // still unrevealed, prefer that — the shared URL is meant to preserve the
    // original puzzle, not the viewer's empty guess.
    function share() {
      if (!currentData) return;
      try {
        let pileObj;
        if (pileSelected.size === 0 && pendingPile.size > 0) {
          pileObj = pileToWire([...pendingPile.keys()], pendingPile);
        } else {
          pileObj = pileToWire([...pileSelected], pileSlots);
        }
        const token = encode_snapshot(JSON.stringify(currentData), JSON.stringify(pileObj));
        const url = window.location.origin + window.location.pathname + '#s=' + token;
        window.history.replaceState(null, '', '#s=' + token);
        document.getElementById('token-input').value = token;
        navigator.clipboard.writeText(url).then(() => {
          showStatus('URL copied!');
        }).catch(() => {
          showStatus('URL updated');
        });
      } catch (e) {
        showStatus('Error: ' + e);
      }
    }

    function revealPile() {
      if (pendingPile.size === 0) return;
      pileSelected = new Set(pendingPile.keys());
      pileSlots = new Map(pendingPile);
      pilePhase = 'order';
      pendingPile = new Map();
      renderAll();
    }

    function showStatus(msg) {
      const el = document.getElementById('share-status');
      el.textContent = msg;
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 2500);
    }

    // ── Load from URL ──────────────────────────────────────────────────────────
    // Accept a bare token, "#s=TOKEN", "?s=TOKEN", or a full URL containing either.
    // Base64url alphabet is [A-Za-z0-9_-], so that's what we match for bare input.
    function extractToken(raw) {
      if (!raw) return '';
      const trimmed = raw.trim();
      const paramMatch = trimmed.match(/[#?&]s=([A-Za-z0-9_-]+)/);
      if (paramMatch) return paramMatch[1];
      if (/^[A-Za-z0-9_-]+$/.test(trimmed)) return trimmed;
      return '';
    }

    // Shared state loads into pendingPile (hidden) so the viewer can solve
    // the puzzle before revealing. Viewer's own picks live in pileSelected.
    function applyDecodedSnapshot(decoded) {
      currentData = decoded.scenario;
      pendingPile = wireToPile(decoded.pile || {});
      pileSelected = new Set();
      pileSlots = new Map();
      pilePhase = 'select';
    }

    function loadFromUrl() {
      const token = extractToken(window.location.hash);
      if (!token) return false;
      try {
        applyDecodedSnapshot(JSON.parse(decode_snapshot(token)));
        renderAll();
        return true;
      } catch (e) {
        console.error('Failed to decode snapshot:', e);
        return false;
      }
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    if (!loadFromUrl()) {
      generate();
    }
    document.getElementById('run').addEventListener('click', generate);
    document.getElementById('share').addEventListener('click', share);
    document.getElementById('reveal').addEventListener('click', revealPile);
    document.getElementById('confirm-pile').addEventListener('click', () => {
      if (pilePhase === 'select') enterOrderPhase();
      else confirmPile();
    });
    document.getElementById('edit-picks').addEventListener('click', backToSelect);
    document.getElementById('load-token').addEventListener('click', () => {
      const input = document.getElementById('token-input');
      const token = extractToken(input.value);
      if (!token) {
        showStatus('No token found');
        return;
      }
      try {
        applyDecodedSnapshot(JSON.parse(decode_snapshot(token)));
        renderAll();
        window.history.replaceState(null, '', '#s=' + token);
        input.value = token;
        showStatus('Loaded!');
      } catch (e) {
        showStatus('Error: ' + e);
      }
    });
    document.getElementById('token-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('load-token').click();
    });
  </script>
</body>
</html>
