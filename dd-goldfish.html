<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>dd-goldfish</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; padding: 1rem 1.5rem; line-height: 1.4; }
    h1 { font-size: 1.1rem; color: #c0c0d0; margin-bottom: 0.75rem; }
    h2 { font-size: 0.95rem; color: #5dade2; margin: 1.25rem 0 0.5rem; }
    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem; align-items: start; }
    textarea { width: 100%; height: 22rem; background: #111a2e; color: #e0e0e0; border: 1px solid #0f3460;
      border-radius: 6px; padding: 0.6rem; font-family: monospace; font-size: 0.8rem; resize: vertical; }
    label { font-size: 0.8rem; color: #aaa; display: block; margin: 0.6rem 0 0.2rem; }
    input[type=number] { background: #111a2e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 4px;
      padding: 0.3rem 0.5rem; font-size: 0.8rem; width: 6rem; }
    select { background: #111a2e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 4px;
      padding: 0.3rem 0.5rem; font-size: 0.8rem; width: 100%; }
    .headline { font-size: 0.95rem; margin-bottom: 0.7rem; padding-bottom: 0.6rem; border-bottom: 1px solid #0f3460; }
    .headline b { color: #f5b041; font-size: 1.5rem; margin: 0 0.2rem; }
    tr.cutoff td { color: #f5b041; font-weight: bold; }
    tr.cutoff .bar { background: #8a5a1a; }
    button { background: #16213e; color: #e0e0e0; border: 1px solid #0f3460; padding: 0.45rem 0.9rem;
      cursor: pointer; font-size: 0.85rem; border-radius: 4px; margin-top: 0.8rem; }
    button:hover:enabled { background: #0f3460; }
    button:disabled { opacity: 0.5; cursor: wait; }
    .panel { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 0.9rem 1rem; }
    .muted { color: #888; font-size: 0.85rem; }
    .summary { display: flex; flex-wrap: wrap; gap: 1.2rem; margin-bottom: 0.5rem; }
    .stat { font-size: 0.85rem; }
    .stat b { color: #5dade2; font-size: 1.1rem; }
    table { border-collapse: collapse; font-size: 0.8rem; width: 100%; max-width: 30rem; }
    td, th { padding: 0.15rem 0.4rem; text-align: left; }
    th { color: #888; font-weight: normal; border-bottom: 1px solid #0f3460; }
    .bar { background: #0f3460; height: 0.9rem; border-radius: 2px; display: inline-block; vertical-align: middle; }
    .bar.prot { background: #2a5a2a; }
    .miss { margin: 0.3rem 0; display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
    .sigil { font-size: 0.7rem; padding: 1px 6px; border-radius: 3px; }
    .sigil.x { background: #3a1a1a; color: #cf6f6f; border: 1px solid #5a2a2a; }
    .sigil.tilde { background: #3a3a1a; color: #cfcf6f; border: 1px solid #5a5a2a; }
    .miss a { color: #5dade2; font-size: 0.78rem; text-decoration: none; border: 1px solid #0f3460;
      border-radius: 4px; padding: 1px 8px; }
    .miss a:hover { background: #0f3460; }
    .miss a.filed { color: #6fcf6f; border-color: #2a5a2a; }
    .ok { color: #6fcf6f; font-size: 0.85rem; }
    .progress { height: 0.55rem; background: #111a2e; border: 1px solid #0f3460; border-radius: 4px; overflow: hidden; margin-top: 0.8rem; }
    .progress-fill { height: 100%; width: 0; background: #5dade2; transition: width 0.08s linear; }
  </style>
</head>
<body>
  <h1>dd-goldfish &mdash; Doomsday goldfish simulator</h1>
  <div class="layout">
    <div>
      <label for="deck">Decklist (paste Moxfield / MTGGoldfish / Arena text export)</label>
      <textarea id="deck" spellcheck="false"></textarea>
      <label for="strategy">Pilot</label>
      <select id="strategy">
        <option value="asap" selected>Aggressive &mdash; cast Doomsday ASAP (solver)</option>
        <option value="baseline">Baseline &mdash; develop &amp; protect</option>
      </select>
      <label for="cutoff">Cut-off turn <span class="muted">(combo-by target)</span></label>
      <input type="number" id="cutoff" value="4" min="1" max="10">
      <label for="games">Games</label>
      <input type="number" id="games" value="2000" min="1" max="50000">
      <label for="turns">Turn cap</label>
      <input type="number" id="turns" value="10" min="1" max="30">
      <br>
      <button id="run" disabled>Loading wasm&hellip;</button>
      <div id="progress" class="progress" hidden><div id="progress-fill" class="progress-fill"></div></div>
      <div id="progress-label" class="muted" style="margin-top:0.3rem;"></div>
    </div>
    <div>
      <div id="missing"></div>
      <div id="results" class="muted">Run a deck to see the cast-turn and protection distributions.</div>
    </div>
  </div>

  <script type="module">
    import init, { run_goldfish_web, run_goldfish_asap_web, missing_cards_web } from './crates/dd-goldfish/pkg/dd_goldfish.js';

    const REPO = 'boryas/mtgctl';

    // Default deck: the sample Doomsday list (so the page works out of the box).
    const SAMPLE = `3 Underground Sea
4 Polluted Delta
1 Flooded Strand
1 Misty Rainforest
1 Scalding Tarn
1 Marsh Flats
1 Island
1 Swamp
2 Undercity Sewers
3 Wasteland
1 Cavern of Souls
2 Lotus Petal
1 Lion's Eye Diamond
4 Dark Ritual
4 Doomsday
4 Brainstorm
4 Ponder
1 Consider
1 Edge of Autumn
4 Force of Will
3 Daze
2 Thoughtseize
1 Street Wraith
1 Thassa's Oracle
1 Unearth
4 Tamiyo, Inquisitive Student
2 Orcish Bowmasters
2 Murktide Regent`;

    const $ = (id) => document.getElementById(id);
    $('deck').value = SAMPLE;

    function issueUrl(card, scry) {
      const mode = card.kind === 'Missing'
        ? '✗ not in catalog (excluded from simulation)'
        : '~ in catalog but inert (no simulation effects — drawn, never cast)';
      const oracle = scry?.oracle_text ?? '_(paste the card\'s Oracle text from Scryfall)_';
      const cost = scry?.mana_cost || '_unknown_';
      const type = scry?.type_line || '_unknown_';
      const body =
        `**Card:** ${card.name}\n\n` +
        `**Failure mode:** ${mode}\n\n` +
        `**Mana cost:** ${cost}\n` +
        `**Type:** ${type}\n\n` +
        '**Oracle text:**\n```\n' + oracle + '\n```\n\n' +
        `**Source:** filed from the dd-goldfish web frontend.`;
      const q = new URLSearchParams({ labels: 'missing-card', title: `Card: ${card.name}`, body });
      return `https://github.com/${REPO}/issues/new?${q}`;
    }

    // Best-effort Scryfall enrichment (api.scryfall.com is CORS-enabled). Upgrades
    // the pre-filled issue body in place; the base link works regardless.
    async function enrich(card, link) {
      try {
        const r = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(card.name)}`);
        if (!r.ok) return;
        link.href = issueUrl(card, await r.json());
      } catch { /* offline / not found — keep the base link */ }
    }

    // Open issues already filed for a card, keyed by lowercased card name (from
    // `Card: <name>` titles). One unauthenticated request; dedups so we don't
    // offer to file a card someone already reported.
    async function fetchFiledCards() {
      const map = new Map();
      try {
        const r = await fetch(`https://api.github.com/repos/${REPO}/issues?state=open&per_page=100`);
        if (!r.ok) return map;
        for (const it of await r.json()) {
          if (it.pull_request) continue;
          const m = /^Card:\s*(.+)$/i.exec(it.title || '');
          if (m) map.set(m[1].trim().toLowerCase(), it);
        }
      } catch { /* offline / rate-limited — fall back to always offering to file */ }
      return map;
    }

    async function renderMissing(list) {
      const el = $('missing');
      if (!list.length) { el.innerHTML = '<div class="ok">✓ every card in this deck is simulated.</div>'; return; }
      el.innerHTML = '<h2>Unimplemented cards</h2>';
      const filed = await fetchFiledCards();
      for (const card of list) {
        const row = document.createElement('div');
        row.className = 'miss';
        const sig = card.kind === 'Missing' ? '<span class="sigil x">✗ missing</span>'
                                             : '<span class="sigil tilde">~ inert</span>';
        const link = document.createElement('a');
        link.target = '_blank'; link.rel = 'noopener';
        const existing = filed.get(card.name.toLowerCase());
        if (existing) {
          link.textContent = `already filed → #${existing.number}`;
          link.href = existing.html_url;
          link.classList.add('filed');
        } else {
          link.textContent = 'File missing-card issue ↗';
          link.href = issueUrl(card, null);
        }
        row.innerHTML = `${sig} <span>${card.qty}× ${card.name}</span>`;
        row.appendChild(link);
        el.appendChild(row);
        if (!existing) enrich(card, link); // only enrich a card we're offering to file
      }
    }

    // GoldfishStats are additive counts, so a big run = sum of small batches.
    function emptyStats() { return { games: 0, fails: 0, cast_turn: {}, protection: {} }; }
    function mergeStats(a, p) {
      a.games += p.games; a.fails += p.fails;
      for (const [k, v] of Object.entries(p.cast_turn)) a.cast_turn[k] = (a.cast_turn[k] || 0) + v;
      for (const [k, v] of Object.entries(p.protection)) a.protection[k] = (a.protection[k] || 0) + v;
    }

    function bar(frac, cls = '') {
      return `<span class="bar ${cls}" style="width:${(frac * 140).toFixed(0)}px"></span> ${(frac * 100).toFixed(1)}%`;
    }

    function castBy(s, t) {
      if (!s.games) return 0;
      let n = 0;
      for (const k of Object.keys(s.cast_turn)) if (Number(k) <= t) n += s.cast_turn[k];
      return n / s.games;
    }

    function renderStats(s, opts) {
      const { strategy, cutoff } = opts;
      const successes = s.games - s.fails;
      const turns = Object.keys(s.cast_turn).map(Number).sort((a, b) => a - b);
      const maxT = $('turns').valueAsNumber || (turns.at(-1) ?? 1);
      let castSum = 0, weighted = 0;
      for (const t of turns) { castSum += s.cast_turn[t]; weighted += t * s.cast_turn[t]; }
      const meanCast = successes ? (weighted / successes) : NaN;
      let protW = 0, protN = 0;
      for (const [p, c] of Object.entries(s.protection)) { protW += Number(p) * c; protN += c; }
      const meanProt = protN ? (protW / protN) : NaN;
      const pByCutoff = castBy(s, cutoff);

      let cum = 0;
      const pdfRows = [], cdfRows = [];
      for (let t = (turns[0] ?? 1); t <= maxT; t++) {
        const c = s.cast_turn[t] || 0;
        cum += c;
        const mark = t === cutoff ? ' class="cutoff"' : '';
        pdfRows.push(`<tr${mark}><td>T${t}</td><td>${bar(c / s.games)}</td></tr>`);
        cdfRows.push(`<tr${mark}><td>≤ T${t}</td><td>${bar(cum / s.games)}</td></tr>`);
      }
      const protRows = Object.keys(s.protection).map(Number).sort((a, b) => a - b).map(p =>
        `<tr><td>${p} layer${p === 1 ? '' : 's'}</td><td>${bar(s.protection[p] / successes, 'prot')}</td></tr>`);

      const pilot = strategy === 'asap'
        ? 'Aggressive (cast Doomsday ASAP)' : 'Baseline (develop &amp; protect)';

      $('results').className = '';
      $('results').innerHTML = `
        <h2>Goldfish results <span class="muted">&mdash; ${pilot}</span></h2>
        <div class="panel">
          <div class="headline">P(cast Doomsday by T${cutoff}) <b>${(pByCutoff * 100).toFixed(1)}%</b>
            <span class="muted">&mdash; the cut-off objective</span></div>
          <div class="summary">
            <div class="stat">cast eventually <b>${(successes / s.games * 100).toFixed(1)}%</b> <span class="muted">(${successes}/${s.games})</span></div>
            <div class="stat">mean cast turn <b>${meanCast.toFixed(2)}</b></div>
            <div class="stat">mean protection <b>${meanProt.toFixed(2)}</b></div>
          </div>
          <h2>P(Doomsday cast on turn t) &mdash; density (PDF)</h2>
          <table>${pdfRows.join('')}</table>
          <h2>P(Doomsday cast by turn t) &mdash; cumulative (CDF)</h2>
          <table>${cdfRows.join('')}</table>
          <h2>Protection layers in hand at cast</h2>
          <table>${protRows.join('')}</table>
        </div>`;
    }

    async function run() {
      const deck = $('deck').value;
      const games = $('games').valueAsNumber || 2000;
      const turns = $('turns').valueAsNumber || 10;
      const strategy = $('strategy').value;
      const cutoff = Math.min($('cutoff').valueAsNumber || 4, turns);
      const sim = (n) => strategy === 'asap'
        ? run_goldfish_asap_web(deck, n, turns, cutoff)
        : run_goldfish_web(deck, n, turns);
      const btn = $('run'), prog = $('progress'), fill = $('progress-fill'), plabel = $('progress-label');
      btn.disabled = true; btn.textContent = 'Simulating…';
      prog.hidden = false; fill.style.width = '0'; plabel.textContent = '';
      await new Promise(r => setTimeout(r, 0));
      try {
        await renderMissing(JSON.parse(missing_cards_web(deck)));
        // The sim is synchronous wasm, so chunk it into batches and yield to the
        // browser between them to repaint the progress bar. GoldfishStats are
        // additive, so the merged aggregate equals one big run.
        const steps = Math.min(40, Math.max(1, games));
        const batch = Math.ceil(games / steps);
        const agg = emptyStats();
        for (let done = 0; done < games; ) {
          const n = Math.min(batch, games - done);
          mergeStats(agg, JSON.parse(sim(n)));
          done += n;
          fill.style.width = (done / games * 100).toFixed(1) + '%';
          plabel.textContent = `simulating… ${done.toLocaleString()} / ${games.toLocaleString()} games`;
          await new Promise(r => setTimeout(r, 0));
        }
        renderStats(agg, { strategy, cutoff });
      } finally {
        prog.hidden = true; plabel.textContent = '';
        btn.disabled = false; btn.textContent = 'Goldfish it';
      }
    }

    await init();
    const btn = $('run');
    btn.disabled = false; btn.textContent = 'Goldfish it';
    btn.addEventListener('click', run);
  </script>
</body>
</html>
