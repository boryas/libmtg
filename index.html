<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>pilegen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; padding: 1.5rem; }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; color: #c0c0d0; }
    button, select { background: #16213e; color: #e0e0e0; border: 1px solid #0f3460; padding: 0.5rem 1rem; cursor: pointer; font-size: 0.9rem; border-radius: 4px; }
    button:hover, select:hover { background: #0f3460; }
    select { appearance: auto; }
    .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .meta { font-size: 0.85rem; color: #888; }
    .boards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    .zone.hand-zone { border-top: 1px dashed #0f3460; padding-top: 0.75rem; }
    .board { background: #16213e; border-radius: 8px; padding: 1rem; border: 1px solid #0f3460; }
    .board h2 { font-size: 1rem; margin-bottom: 0.75rem; border-bottom: 1px solid #0f3460; padding-bottom: 0.5rem; }
    .board h2.us { color: #5dade2; }
    .board h2.opp { color: #e74c3c; }
    .zone { margin-bottom: 0.75rem; }
    .zone-label { font-size: 0.75rem; text-transform: uppercase; color: #666; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .cards { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .card { position: relative; width: 100px; border-radius: 6px; overflow: hidden; border: 1px solid #333; transition: transform 0.15s; }
    .card:hover { transform: scale(1.8); z-index: 10; }
    .card img { width: 100%; display: block; }
    .card.tapped { transform: rotate(90deg); margin: 1rem 0.5rem; }
    .card.tapped:hover { transform: rotate(90deg) scale(1.8); }
    .card-badge { position: absolute; bottom: 2px; right: 2px; background: rgba(0,0,0,0.8); color: #fff; font-size: 0.65rem; padding: 1px 4px; border-radius: 3px; }
    .card-text { background: #1e2a3a; border: 1px solid #333; border-radius: 4px; padding: 0.25rem 0.5rem; font-size: 0.8rem; }
    .life { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem; }
    .log { background: #16213e; border-radius: 8px; padding: 1rem; border: 1px solid #0f3460; }
    .log summary { cursor: pointer; font-size: 0.9rem; color: #888; }
    .log pre { font-family: monospace; font-size: 0.75rem; margin-top: 0.5rem; white-space: pre-wrap; color: #aaa; }
    .hidden-cards { color: #666; font-style: italic; font-size: 0.8rem; padding: 0.25rem 0; }
    #loading { color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Doomsday Pile Scenario</h1>
    <label style="color:#888;font-size:0.85rem">vs</label>
    <select id="matchup"></select>
    <button id="run">Generate</button>
  </div>
  <div id="loading">Loading WASM…</div>
  <div id="content" style="display:none">
    <div class="meta" id="meta"></div>
    <div class="boards">
      <div class="board" id="us-board"></div>
      <div class="board" id="opp-board"></div>
    </div>
    <details class="log">
      <summary>Turn Log</summary>
      <pre id="log"></pre>
    </details>
  </div>

  <script type="module">
    import init, { run_scenario, list_matchups } from './pilegen/pkg/pilegen.js';
    await init();

    const sel = document.getElementById('matchup');
    for (const m of JSON.parse(list_matchups())) {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      sel.appendChild(opt);
    }

    const scryfallImg = (name) =>
      `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image&version=small`;

    function renderCard(name, opts = {}) {
      const div = document.createElement('div');
      div.className = 'card' + (opts.tapped ? ' tapped' : '');
      const img = document.createElement('img');
      img.src = scryfallImg(name);
      img.alt = name;
      img.loading = 'lazy';
      div.appendChild(img);
      if (opts.badge) {
        const badge = document.createElement('span');
        badge.className = 'card-badge';
        badge.textContent = opts.badge;
        div.appendChild(badge);
      }
      return div;
    }

    function renderZone(container, label, items, extraClass) {
      if (!items.length) return;
      const zone = document.createElement('div');
      zone.className = 'zone' + (extraClass ? ' ' + extraClass : '');
      const lbl = document.createElement('div');
      lbl.className = 'zone-label';
      lbl.textContent = label;
      zone.appendChild(lbl);
      const cards = document.createElement('div');
      cards.className = 'cards';
      for (const item of items) cards.appendChild(item);
      zone.appendChild(cards);
      container.appendChild(zone);
    }

    function renderBoard(el, player, isUs) {
      el.innerHTML = '';
      const h2 = document.createElement('h2');
      h2.className = isUs ? 'us' : 'opp';
      h2.textContent = player.deck_name;
      el.appendChild(h2);

      const life = document.createElement('div');
      life.className = 'life';
      life.textContent = `♥ ${player.life}`;
      el.appendChild(life);

      const permCards = player.permanents.map(p => {
        let badge = [];
        if (p.counters) badge.push(`${p.counters > 0 ? '+' : ''}${p.counters}`);
        if (p.loyalty) badge.push(`Loy:${p.loyalty}`);
        return renderCard(p.name, { tapped: p.tapped, badge: badge.join(' ') || undefined });
      });
      renderZone(el, 'Permanents', permCards);

      const landCards = player.lands.map(p => {
        let badge = [];
        if (p.counters) badge.push(`${p.counters > 0 ? '+' : ''}${p.counters}`);
        return renderCard(p.name, { tapped: p.tapped, badge: badge.join(' ') || undefined });
      });
      renderZone(el, 'Lands', landCards);

      const handCards = player.hand.map(c => renderCard(c.name));
      if (player.hand_hidden > 0) {
        const div = document.createElement('div');
        div.className = 'hidden-cards';
        div.textContent = `+ ${player.hand_hidden} hidden`;
        handCards.push(div);
      }
      renderZone(el, 'Hand', handCards, 'hand-zone');

      const gyCards = player.graveyard.map(name => renderCard(name));
      renderZone(el, 'Graveyard', gyCards);

      const exCards = player.exile.map(name => renderCard(name));
      renderZone(el, 'Exile', exCards);
    }

    function render() {
      const data = JSON.parse(run_scenario(sel.value));
      document.getElementById('meta').textContent =
        `Turn ${data.turn} · ${data.stage} · ${data.on_play ? 'On the play' : 'On the draw'}`;
      renderBoard(document.getElementById('us-board'), data.us, true);
      renderBoard(document.getElementById('opp-board'), data.opp, false);
      document.getElementById('log').textContent = data.log.join('\n');
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = '';
    }

    render();
    document.getElementById('run').addEventListener('click', render);
  </script>
</body>
</html>
